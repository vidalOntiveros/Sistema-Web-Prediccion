name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm exec prisma generate

      - name: Lint api
        run: pnpm --filter api lint:ci
      - name: Build api
        run: pnpm --filter api build
      - name: Test api
        run: pnpm --filter api test

      - name: Lint web
        run: pnpm --filter web lint
      - name: Build web
        run: pnpm --filter web build

  ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: black --check .
      - run: ruff check .
      - run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: [node, ml]
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t sistema-prediccion/api .
      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t sistema-prediccion/web .
      - name: Build ml image
        run: docker build -f apps/ml/Dockerfile -t sistema-prediccion/ml apps/ml
